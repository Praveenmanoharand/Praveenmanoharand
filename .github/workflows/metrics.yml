# ============================================================================
# 📊 GitHub Metrics Card Generator
# ============================================================================
# Generates a beautiful SVG stats card using lowlighter/metrics.
# Includes: commits, languages, streaks, notable contributions.
# Output: Saved to assets/screenshots/metrics.svg
# Schedule: Runs daily at midnight UTC and on push to main.
# ============================================================================

name: Generate Metrics

on:
  # Run on every push to main
  push:
    branches:
      - main

  # Cron schedule: daily at midnight UTC
  schedule:
    - cron: "0 0 * * *"

  # Allow manual trigger
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      # ── Checkout repository ─────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Generate full metrics SVG ───────────────────────────────────────
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          template: classic
          base: header, activity, community, repositories
          base_indepth: yes

          # ── Languages plugin ────────────────────────────────────────────
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage

          # ── Notable contributions ───────────────────────────────────────
          plugin_notable: yes
          plugin_notable_from: organization

          # ── Habits plugin ───────────────────────────────────────────────
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%

          # ── Output configuration ────────────────────────────────────────
          filename: assets/screenshots/metrics.svg
          config_timezone: UTC

      # ── Commit updated metrics ──────────────────────────────────────────
      - name: Commit Metrics
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/screenshots/metrics.svg
          git diff --staged --quiet || git commit -m "📊 Update metrics [skip ci]"
          git push
