# ============================================================================
# 🐍 Contribution Snake Animation
# ============================================================================
# Generates an animated SVG snake that eats your GitHub contribution graph.
# Uses: Platane/snk (https://github.com/Platane/snk)
# Output: Committed to the `output` branch as github-contribution-grid-snake.svg
# Schedule: Runs every 12 hours and on push to main.
# ============================================================================

name: Generate Snake Animation

on:
  # Run on every push to main
  push:
    branches:
      - main

  # Cron schedule: every 12 hours
  schedule:
    - cron: "0 */12 * * *"

  # Allow manual trigger
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── Generate the snake SVG ──────────────────────────────────────────
      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # ── Push to output branch ───────────────────────────────────────────
      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
