<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 20" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="80%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Main line -->
  <line x1="0" y1="10" x2="800" y2="10" stroke="url(#divGrad)" stroke-width="2" stroke-linecap="round"/>

  <!-- Center diamond -->
  <polygon points="400,3 407,10 400,17 393,10" fill="#06b6d4" opacity="0.8">
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </polygon>

  <!-- Dots -->
  <circle cx="360" cy="10" r="2" fill="#7c3aed" opacity="0.6"/>
  <circle cx="440" cy="10" r="2" fill="#ec4899" opacity="0.6"/>
</svg>
