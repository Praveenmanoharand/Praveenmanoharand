<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="logoGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer hexagon -->
  <polygon points="50,5 93,27.5 93,72.5 50,95 7,72.5 7,27.5" fill="none" stroke="url(#logoGrad)" stroke-width="3" filter="url(#logoGlow)"/>

  <!-- Inner code brackets < / > -->
  <text x="50" y="60" text-anchor="middle" font-family="'Courier New', monospace" font-size="32" font-weight="bold" fill="url(#logoGrad)" filter="url(#logoGlow)">
    &lt;/&gt;
  </text>

  <!-- Decorative dots -->
  <circle cx="50" cy="18" r="3" fill="#7c3aed" opacity="0.8"/>
  <circle cx="50" cy="82" r="3" fill="#ec4899" opacity="0.8"/>
</svg>
