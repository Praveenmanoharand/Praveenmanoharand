<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="spaceGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a2e"/>
      <stop offset="100%" stop-color="#1a0a3e"/>
    </linearGradient>
    <linearGradient id="suitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <radialGradient id="planetGrad">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </radialGradient>
  </defs>

  <!-- Space background -->
  <rect width="500" height="400" fill="url(#spaceGrad)"/>

  <!-- Stars -->
  <circle cx="50" cy="30" r="1.5" fill="white" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="80" r="1" fill="white" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="400" cy="50" r="1.5" fill="white" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="120" r="1" fill="white" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.1;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="300" r="1" fill="white" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="280" r="1.5" fill="white" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.15;0.6" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="50" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="300" cy="350" r="1" fill="white" opacity="0.5"/>
  <circle cx="430" cy="180" r="0.8" fill="white" opacity="0.3"/>

  <!-- Planet -->
  <circle cx="400" cy="320" r="60" fill="url(#planetGrad)" opacity="0.6"/>
  <ellipse cx="400" cy="320" rx="85" ry="12" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.4" transform="rotate(-15, 400, 320)"/>

  <!-- Astronaut body -->
  <g transform="translate(180, 140)">
    <animateTransform attributeName="transform" type="translate" values="180,140;180,130;180,140" dur="5s" repeatCount="indefinite"/>

    <!-- Helmet -->
    <circle cx="50" cy="30" r="30" fill="url(#suitGrad)" stroke="#64748b" stroke-width="2"/>
    <circle cx="50" cy="30" r="22" fill="#0f172a"/>
    <!-- Visor reflection -->
    <path d="M35,20 C40,15 55,15 60,20" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>

    <!-- Body -->
    <rect x="25" y="58" width="50" height="60" rx="10" fill="url(#suitGrad)" stroke="#64748b" stroke-width="1.5"/>

    <!-- Backpack -->
    <rect x="70" y="60" width="18" height="45" rx="5" fill="#94a3b8" stroke="#64748b" stroke-width="1"/>

    <!-- Arms -->
    <rect x="5" y="65" width="22" height="12" rx="6" fill="url(#suitGrad)" stroke="#64748b" stroke-width="1" transform="rotate(-20, 16, 71)"/>
    <rect x="73" y="65" width="22" height="12" rx="6" fill="url(#suitGrad)" stroke="#64748b" stroke-width="1" transform="rotate(20, 84, 71)"/>

    <!-- Legs -->
    <rect x="28" y="115" width="16" height="30" rx="6" fill="url(#suitGrad)" stroke="#64748b" stroke-width="1" transform="rotate(-5, 36, 130)"/>
    <rect x="56" y="115" width="16" height="30" rx="6" fill="url(#suitGrad)" stroke="#64748b" stroke-width="1" transform="rotate(5, 64, 130)"/>

    <!-- Boots -->
    <rect x="24" y="142" width="22" height="10" rx="4" fill="#475569"/>
    <rect x="54" y="142" width="22" height="10" rx="4" fill="#475569"/>

    <!-- Laptop in hand -->
    <rect x="-5" y="72" width="20" height="14" rx="2" fill="#7c3aed" opacity="0.8"/>
    <rect x="-3" y="74" width="16" height="9" rx="1" fill="#06b6d4" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- "Exploring" text -->
  <text x="250" y="380" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="rgba(167,139,250,0.6)" font-style="italic">
    Exploring the tech universe...
  </text>
</svg>
