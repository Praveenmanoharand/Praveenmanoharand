<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="aiGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="aiGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="aiGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="400" fill="#0f0a2e"/>

  <!-- Neural network nodes - Layer 1 (input) -->
  <circle cx="80" cy="100" r="10" fill="url(#aiGrad1)" filter="url(#aiGlow)">
    <animate attributeName="r" values="10;12;10" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="170" r="10" fill="url(#aiGrad1)" filter="url(#aiGlow)">
    <animate attributeName="r" values="10;12;10" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="240" r="10" fill="url(#aiGrad1)" filter="url(#aiGlow)">
    <animate attributeName="r" values="10;12;10" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="80" cy="310" r="10" fill="url(#aiGrad1)" filter="url(#aiGlow)">
    <animate attributeName="r" values="10;12;10" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Layer 2 (hidden 1) -->
  <circle cx="200" cy="120" r="10" fill="url(#aiGrad2)" filter="url(#aiGlow)"/>
  <circle cx="200" cy="200" r="10" fill="url(#aiGrad2)" filter="url(#aiGlow)"/>
  <circle cx="200" cy="280" r="10" fill="url(#aiGrad2)" filter="url(#aiGlow)"/>

  <!-- Layer 3 (hidden 2) -->
  <circle cx="320" cy="140" r="10" fill="url(#aiGrad1)" filter="url(#aiGlow)"/>
  <circle cx="320" cy="220" r="10" fill="url(#aiGrad1)" filter="url(#aiGlow)"/>
  <circle cx="320" cy="300" r="10" fill="url(#aiGrad1)" filter="url(#aiGlow)"/>

  <!-- Layer 4 (output) -->
  <circle cx="420" cy="180" r="12" fill="url(#aiGrad2)" filter="url(#aiGlow)">
    <animate attributeName="r" values="12;15;12" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="260" r="12" fill="url(#aiGrad2)" filter="url(#aiGlow)">
    <animate attributeName="r" values="12;15;12" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Connections Layer 1 → 2 -->
  <g stroke="rgba(124,58,237,0.3)" stroke-width="1">
    <line x1="90" y1="100" x2="190" y2="120"><animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/></line>
    <line x1="90" y1="100" x2="190" y2="200"/>
    <line x1="90" y1="100" x2="190" y2="280"/>
    <line x1="90" y1="170" x2="190" y2="120"/>
    <line x1="90" y1="170" x2="190" y2="200"><animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/></line>
    <line x1="90" y1="170" x2="190" y2="280"/>
    <line x1="90" y1="240" x2="190" y2="120"/>
    <line x1="90" y1="240" x2="190" y2="200"/>
    <line x1="90" y1="240" x2="190" y2="280"><animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/></line>
    <line x1="90" y1="310" x2="190" y2="120"/>
    <line x1="90" y1="310" x2="190" y2="200"/>
    <line x1="90" y1="310" x2="190" y2="280"/>
  </g>

  <!-- Connections Layer 2 → 3 -->
  <g stroke="rgba(6,182,212,0.3)" stroke-width="1">
    <line x1="210" y1="120" x2="310" y2="140"><animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="2.2s" repeatCount="indefinite"/></line>
    <line x1="210" y1="120" x2="310" y2="220"/>
    <line x1="210" y1="120" x2="310" y2="300"/>
    <line x1="210" y1="200" x2="310" y2="140"/>
    <line x1="210" y1="200" x2="310" y2="220"><animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="2.8s" repeatCount="indefinite"/></line>
    <line x1="210" y1="200" x2="310" y2="300"/>
    <line x1="210" y1="280" x2="310" y2="140"/>
    <line x1="210" y1="280" x2="310" y2="220"/>
    <line x1="210" y1="280" x2="310" y2="300"><animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="3.2s" repeatCount="indefinite"/></line>
  </g>

  <!-- Connections Layer 3 → 4 -->
  <g stroke="rgba(236,72,153,0.3)" stroke-width="1.5">
    <line x1="330" y1="140" x2="408" y2="180"><animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="1.8s" repeatCount="indefinite"/></line>
    <line x1="330" y1="140" x2="408" y2="260"/>
    <line x1="330" y1="220" x2="408" y2="180"/>
    <line x1="330" y1="220" x2="408" y2="260"><animate attributeName="stroke-opacity" values="0.3;0.7;0.3" dur="2.3s" repeatCount="indefinite"/></line>
    <line x1="330" y1="300" x2="408" y2="180"/>
    <line x1="330" y1="300" x2="408" y2="260"/>
  </g>

  <!-- Data pulse traveling along a connection -->
  <circle r="3" fill="#06b6d4" filter="url(#aiGlow)">
    <animateMotion dur="2s" repeatCount="indefinite" path="M90,170 L190,200"/>
  </circle>
  <circle r="3" fill="#ec4899" filter="url(#aiGlow)">
    <animateMotion dur="2.5s" repeatCount="indefinite" path="M210,200 L310,220"/>
  </circle>
  <circle r="3" fill="#7c3aed" filter="url(#aiGlow)">
    <animateMotion dur="1.8s" repeatCount="indefinite" path="M330,220 L408,260"/>
  </circle>

  <!-- Title -->
  <text x="250" y="380" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="rgba(167,139,250,0.7)" font-weight="bold">
    AI &amp; Machine Learning
  </text>
</svg>
