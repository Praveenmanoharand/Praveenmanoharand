<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="xMidYMid meet">
  <defs>
    <!-- Matching animated gradient -->
    <linearGradient id="footerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed">
        <animate attributeName="stop-color" values="#7c3aed;#06b6d4;#ec4899;#7c3aed" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#06b6d4">
        <animate attributeName="stop-color" values="#06b6d4;#ec4899;#7c3aed;#06b6d4" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ec4899">
        <animate attributeName="stop-color" values="#ec4899;#7c3aed;#06b6d4;#ec4899" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="120" fill="url(#footerGrad)"/>

  <!-- Animated wave at top -->
  <path d="M0,30 C200,60 400,10 600,40 C800,70 1000,20 1200,50 L1200,0 L0,0 Z" fill="rgba(0,0,0,0.2)">
    <animate attributeName="d" values="M0,30 C200,60 400,10 600,40 C800,70 1000,20 1200,50 L1200,0 L0,0 Z;M0,50 C200,20 400,60 600,30 C800,10 1000,60 1200,30 L1200,0 L0,0 Z;M0,30 C200,60 400,10 600,40 C800,70 1000,20 1200,50 L1200,0 L0,0 Z" dur="7s" repeatCount="indefinite"/>
  </path>

  <!-- Second wave layer -->
  <path d="M0,20 C300,50 600,5 900,35 C1100,55 1200,15 1200,15 L1200,0 L0,0 Z" fill="rgba(0,0,0,0.1)">
    <animate attributeName="d" values="M0,20 C300,50 600,5 900,35 C1100,55 1200,15 1200,15 L1200,0 L0,0 Z;M0,40 C300,10 600,45 900,15 C1100,35 1200,45 1200,45 L1200,0 L0,0 Z;M0,20 C300,50 600,5 900,35 C1100,55 1200,15 1200,15 L1200,0 L0,0 Z" dur="9s" repeatCount="indefinite"/>
  </path>

  <!-- Footer text -->
  <text x="600" y="85" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.8)">
    ⭐ From YourUsername with ❤️ — Thanks for visiting!
  </text>
</svg>
